server:
  port: 8080

spring:
  application:
    name: transafe

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/transafe_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

    # Elasticsearch 配置
    elasticsearch:
      hosts: ${ES_HOSTS:localhost:9200}

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000           # 24小时
  refresh-expiration: 604800000  # 7天

# 文件上传服务
file-storage:
  url: ${FILE_STORAGE_URL:http://localhost:8081}

# RabbitMQ 队列
rabbitmq:
  queue:
    task: file.parse.task
    result: file.parse.result
  exchange: file.parse.exchange

# 配额默认值
quota:
  default:
    daily-translation: 5000
    storage: 5368709120  # 5GB

# 日志配置
logging:
  level:
    root: INFO
    com.benmake.transafe: DEBUG
    org.springframework.security: INFO

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true