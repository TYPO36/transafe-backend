# ============================================================
# Transafe 开发环境 Docker Compose 配置
# ============================================================
# 使用说明：
#   启动所有服务：docker-compose up -d
#   停止所有服务：docker-compose down
#   停止并删除数据：docker-compose down -v
#   查看服务状态：docker-compose ps
#   查看服务日志：docker-compose logs -f [服务名]
#   重启单个服务：docker-compose restart [服务名]
# ============================================================

services:
  # ---------------------------------------------------------
  # Portainer - Docker 可视化管理界面
  # ---------------------------------------------------------
  # 访问地址：http://localhost:9000
  # 首次访问需要设置管理员密码（至少12位）
  # 功能：管理容器、镜像、网络、数据卷，查看日志和状态
  # ---------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: transafe-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"                                        # Web 管理界面端口
      - "9443:9443"                                        # HTTPS 端口（可选）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock          # Docker socket，用于管理 Docker
      - ./data/portainer:/data                             # Portainer 数据持久化
    networks:
      - transafe-network

  # ---------------------------------------------------------
  # MySQL 8.0 - 主数据库
  # ---------------------------------------------------------
  # 访问地址：localhost:3306
  # 默认账号：root / root123
  # 可视化工具推荐：Navicat、DBeaver、MySQL Workbench
  # ---------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: transafe-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123                         # root 用户密码（生产环境请修改）
      MYSQL_DATABASE: transafe_db                          # 自动创建的数据库名
      MYSQL_CHARSET: utf8mb4                               # 字符集
      MYSQL_COLLATION: utf8mb4_unicode_ci                  # 排序规则
      TZ: Asia/Shanghai                                    # 时区
    volumes:
      - ./data/mysql:/var/lib/mysql                        # 数据持久化
      - ./init-sql:/docker-entrypoint-initdb.d             # 初始化 SQL 脚本目录（可选）
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password  # MySQL 8.0 兼容旧客户端
      - --max_connections=1000                             # 最大连接数
    networks:
      - transafe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Redis 7 - 缓存服务
  # ---------------------------------------------------------
  # 访问地址：localhost:6379
  # 默认无密码（生产环境建议设置密码）
  # 可视化工具推荐：RedisInsight、Another Redis Desktop Manager
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: transafe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data                                 # 数据持久化
    command: redis-server --appendonly yes                 # 开启 AOF 持久化
    networks:
      - transafe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Elasticsearch 8.11 - 搜索引擎（带IK中文分词器）
  # ---------------------------------------------------------
  # 访问地址：http://localhost:9200
  # 单节点模式，适用于开发和测试
  # 可视化工具推荐：Kibana、Elasticvue（浏览器插件）
  # ---------------------------------------------------------
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-ik:8.11.0
    container_name: transafe-es
    restart: unless-stopped
    ports:
      - "9200:9200"                                        # HTTP API 端口
      - "9300:9300"                                        # 节点通信端口（集群用）
    environment:
      - discovery.type=single-node                         # 单节点模式
      - xpack.security.enabled=false                       # 关闭安全认证（开发环境）
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"                   # JVM 堆内存（根据服务器配置调整）
      - TZ=Asia/Shanghai
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data  # 数据持久化
    networks:
      - transafe-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------
  # RabbitMQ 3.12 - 消息队列（含管理界面）
  # ---------------------------------------------------------
  # 访问地址：
  #   AMQP 端口：localhost:5672
  #   管理界面：http://localhost:15672
  # 默认账号：guest / guest
  # ---------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: transafe-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"                                        # AMQP 协议端口
      - "15672:15672"                                      # Web 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: guest                         # 默认用户名（生产环境请修改）
      RABBITMQ_DEFAULT_PASS: guest                         # 默认密码（生产环境请修改）
      TZ: Asia/Shanghai
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq                  # 数据持久化
    networks:
      - transafe-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------
  # Kibana - Elasticsearch 可视化界面（可选）
  # ---------------------------------------------------------
  # 访问地址：http://localhost:5601
  # 用于查看和管理 Elasticsearch 数据、创建仪表板
  # ---------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: transafe-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200       # ES 连接地址（使用服务名）
      I18N_LOCALE: zh-CN                                   # 中文界面
      TZ: Asia/Shanghai
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - transafe-network

# ============================================================
# 网络配置
# ============================================================
# 所有服务在同一网络中，可以通过服务名互相访问
# 例如：Spring Boot 连接 MySQL 使用 mysql:3306
# ============================================================
networks:
  transafe-network:
    driver: bridge

# ============================================================
# 数据卷说明
# ============================================================
# 数据存储在 ./data 目录下，每个服务一个子目录
# 备份数据：复制 ./data 目录即可
# 清空数据：删除 ./data 目录后重启服务
# ============================================================